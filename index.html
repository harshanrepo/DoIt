<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="stylesheet" href="index.css">
    <link rel="shortcut icon" href="assests/favicon.png" type="image/png">
</head>
<body>
    <h1>Todo List</h1>
    <div class="todo-grid-class">
        <input type="text" id="todo-list" placeholder="Todo name" onkeydown="adding(event)">
        <input type="date"  id="date" onkeydown="adding(event)">
        <button onclick="add()" id="add">Add</button>
    </div>
    <div class="lists todo-grid"></div>
    <script src="index.js"></script>
</body>
</html>
